services:
  - type: web
    name: furniture-factory
    runtime: python
    repo: https://github.com/zhuchok0/FurnitureFabric
    plan: free
    buildCommand: "./build.sh"         # 1️⃣ Команда для сборки
    startCommand: "gunicorn FurnitureFactory.wsgi:application" # 2️⃣ Команда для запуска
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: furniture-factory-db
          property: connectionString

databases:
  - name: furniture-factory-db
    plan: free