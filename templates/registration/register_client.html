{% extends "base_generic.html" %}

{% block title %}Register as Client{% endblock %}

{% block content %}
<h2>Client Registration</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
