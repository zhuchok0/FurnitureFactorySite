{% extends "base_generic.html" %}

{% block title %}Delete Review{% endblock %}

{% block content %}
<h1>Confirm deletion</h1>
<p>Are you sure you want to delete the review by <strong>{{ review.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'reviews_list' %}">Cancel</a>
</form>
{% endblock %}
