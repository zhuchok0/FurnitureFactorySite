{% extends "base_generic.html" %}

{% block title %}Place New Order{% endblock %}

{% block content %}
<h2>✍️ Place a New Order</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit Order</button>
</form>

<p><a href="{% url 'main' %}">Cancel</a></p>
{% endblock %}
