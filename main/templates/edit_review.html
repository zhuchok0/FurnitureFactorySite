{% extends "base_generic.html" %}

{% block title %}Edit Review{% endblock %}

{% block content %}
<h1>Edit review by {{ review.name }}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'reviews_list' %}">Cancel</a>
</form>
{% endblock %}
